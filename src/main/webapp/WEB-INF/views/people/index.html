<div th:replace="~{header :: header('People')}"></div>


<div class="container">
    <div class="row">
        <div class="col-sm-8">
            <h5>Name</h5>
        </div>
        <div class="col-sm-4">
            <a href="people/new">Add new person</a>
        </div>
    </div>

    <div class="row" th:each="person : ${people}">
        <div class="col-sm-1">
            <a th:href="@{people/{id}(id=${person.getId()})}" th:text="${person.getName()}">Name</a>
        </div>
        <div class="col-sm-1">
            <a th:href="@{people/edit/{id}(id=${person.getId()})}">Edit</a>
        </div>
        <div class="col-sm-10 ">
            <form th:method="DELETE" th:action="@{people/{id}(id=${person.getId()})}">
                <input class="btn btn-danger" type="submit" value="delete">
            </form>
        </div>
    </div>
</div>

</body>
</html>
