<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
    <form th:method="PATCH" th:action="@{/books/{id}(id = ${book.getId()})}" th:object="${book}">

        <div class="form-group">
            <div class="bg-danger"  th:if="${#fields.hasErrors('bookName')}" th:errors="*{bookName}">Book name error</div>
            <label  for="bookName">Book name</label>
            <input type="text" th:field="*{bookName}" id="bookName">
        </div>

        <div class="form-group">
            <div class="bg-danger"  th:if="${#fields.hasErrors('authorName')}" th:errors="*{authorName}">Author name error</div>
            <label  for="authorName">Author name</label>
            <input type="text" th:field="*{authorName}" id="authorName">
        </div>


        <div class="form-group">
            <div class="bg-danger" th:if="${#fields.hasErrors('publicationYear')}" th:errors="*{publicationYear}">Publication year error</div>
            <label for="publicationYear">Publication year</label>
            <input type="number" th:field="*{publicationYear}" id="publicationYear">
        </div>

        <input type="submit" class="btn btn-primary" value="Edit">
    </form>
</div>
</body>
</html>
